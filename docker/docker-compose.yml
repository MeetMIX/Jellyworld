version: '3.8'

services:
  # 🎬 LE BACKEND (Jellyfin)
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyworld-backend
    ports:
      - "8096:8096"
    volumes:
      - ./config:/config
      - ./cache:/cache
      # ⚠️ ICI, on mettra les chemins vers tes fichiers vidéos sur ton Ubuntu :
      - /mnt/medias/films:/media/films:ro
      - /mnt/medias/series:/media/series:ro
    environment:
      - TZ=Europe/Paris
    restart: unless-stopped

  # 🌐 LE FRONTEND (Ton interface premium)
  jellyworld-web:
    image: node:20-alpine
    container_name: jellyworld-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../jellyworld-web:/app # Docker Ubuntu va lire le code de ce dossier
    command: sh -c "npm install && npm run dev"
    # ⚠️ NEXT_PUBLIC_JELLYFIN_API n'est lue par aucun fichier du code (la variable
    # attendue est NEXT_PUBLIC_JELLYFIN_URL) — ces réglages étaient donc ignorés.
    # Next.js charge de toute façon .env.local du dossier monté ; ces valeurs ne
    # servent que si ce fichier est absent. Remplace l'IP par celle réellement
    # joignable depuis le navigateur du client (pas "localhost" sauf accès local).
    environment:
      - JELLYFIN_INTERNAL_URL=http://jellyworld-backend:8096
      - NEXT_PUBLIC_JELLYFIN_URL=http://192.168.220.148:8096
    restart: unless-stopped